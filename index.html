<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Application Tracker</title>

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- DaisyUI -->
  <link
    href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css"
    rel="stylesheet"
  />
</head>

<body class="bg-gray-100">

    <!-- ===== DASHBOARD ===== -->
<section class="max-w-7xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6">Job Application Tracker</h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded-xl shadow">
      <p class="text-sm text-gray-500">Total</p>
      <p class="text-3xl font-bold" id="totalCount">0</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
      <p class="text-sm text-gray-500">Interview</p>
      <p class="text-3xl font-bold text-success" id="interviewCount">0</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
      <p class="text-sm text-gray-500">Rejected</p>
      <p class="text-3xl font-bold text-error" id="rejectedCount">0</p>
    </div>
  </div>
</section>


<script src="script.js"></script>
</body>
</html>
