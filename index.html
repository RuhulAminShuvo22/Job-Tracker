<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Application Tracker</title>

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- DaisyUI -->
  <link
    href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css"
    rel="stylesheet"
  />
</head>

<body class="bg-gray-100">

<!-- ===== DASHBOARD ===== -->
<section class="max-w-6xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-8">Job Application Tracker</h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded-2xl shadow">
      <p class="text-sm text-gray-500">Total</p>
      <p class="text-3xl font-bold" id="totalCount">0</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
      <p class="text-sm text-gray-500">Interview</p>
      <p class="text-3xl font-bold text-success" id="interviewCount">0</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
      <p class="text-sm text-gray-500">Rejected</p>
      <p class="text-3xl font-bold text-error" id="rejectedCount">0</p>
    </div>
  </div>
</section>

<!-- ===== JOB SECTION ===== -->
<section class="max-w-6xl mx-auto px-6 pb-16">

  <!-- Header -->
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-semibold">Available Jobs</h2>
    <span class="text-sm font-medium" id="tabCount">0 Jobs</span>
  </div>

  <!-- Tabs -->
  <div class="flex gap-6 border-b mb-8">
    <button
      class="pb-3 border-b-2 border-blue-600 text-blue-600 font-medium"
      onclick="changeTab('all', this)">
      All
    </button>

    <button
      class="pb-3 text-gray-500"
      onclick="changeTab('interview', this)">
      Interview
    </button>

    <button
      class="pb-3 text-gray-500"
      onclick="changeTab('rejected', this)">
      Rejected
    </button>
  </div>

  <!-- Cards (Single Column Layout) -->
  <div
    id="jobsContainer"
    class="flex flex-col gap-6">
  </div>

  <!-- Empty State -->
  <div id="emptyState" class="hidden text-center mt-12">
    <img src="jobs.png" class="w-24 mx-auto mb-6" />
    <h3 class="text-xl font-semibold">No Jobs Available</h3>
    <p class="text-gray-500">Check back soon for new job opportunities</p>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
